<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطاعم حلال - المغرب العربي | Restaurants Halal Maghreb</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style-maghreb.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div>
                <h1>مطاعم حلال - المغرب العربي</h1>
                <p>اكتشف أفضل المطاعم الحلال قرب منزلك | Trouvez les meilleurs restaurants halal près de chez vous</p>
            </div>
            <div class="header-right">
                <div class="nav-links" id="nav-links"></div>
                <div class="auth-buttons" id="auth-section">
                    <a href="auth.html" class="auth-btn">تسجيل الدخول</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Bandeau des drapeaux -->
    <div class="flags-banner">
        <img src="images/flag-algeria.svg" alt="الجزائر - Algérie" title="الجزائر - Algérie">
        <img src="images/flag-morocco.svg" alt="المغرب - Maroc" title="المغرب - Maroc">
        <img src="images/flag-tunisia.svg" alt="تونس - Tunisie" title="تونس - Tunisie">
    </div>

    <main>
        <div class="container">
            <div class="sidebar">
                <h2>قائمة المطاعم | Liste des Restaurants</h2>
                <div id="restaurant-list"></div>
            </div>

            <div class="map-container">
                <div id="map"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 مطاعم حلال - المغرب العربي | Restaurants Halal Maghreb</p>
        <p style="margin-top: 0.5rem; font-size: 0.9rem;">الجزائر 🇩🇿 | المغرب 🇲🇦 | تونس 🇹🇳</p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
