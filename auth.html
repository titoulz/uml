<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion / Inscription - Restaurants Halal</title>
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>🍽️ Restaurants Halal</h1>
                <p>Bienvenue sur votre plateforme de restaurants</p>
            </div>

            <!-- Boutons de switch -->
            <div class="auth-switch">
                <button class="switch-btn active" id="login-tab">Connexion</button>
                <button class="switch-btn" id="register-tab">Inscription</button>
            </div>

            <!-- Formulaire de connexion -->
            <form id="login-form" class="auth-form active">
                <h2>Se connecter</h2>

                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="votre.email@exemple.com" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Mot de passe</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember-me">
                        <span>Se souvenir de moi</span>
                    </label>
                    <a href="#" class="forgot-password">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="submit-btn">Se connecter</button>
            </form>

            <!-- Formulaire d'inscription -->
            <form id="register-form" class="auth-form">
                <h2>Créer un compte</h2>

                <div class="form-group">
                    <label for="register-role">Type de compte</label>
                    <select id="register-role" required>
                        <option value="">Sélectionnez votre rôle</option>
                        <option value="client">Client - Je cherche des restaurants</option>
                        <option value="restaurant">Restaurant - Je gère un restaurant</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="register-name">Nom complet</label>
                    <input type="text" id="register-name" placeholder="Jean Dupont" required>
                </div>

                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" placeholder="votre.email@exemple.com" required>
                </div>

                <div class="form-group">
                    <label for="register-password">Mot de passe</label>
                    <input type="password" id="register-password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="register-confirm">Confirmer le mot de passe</label>
                    <input type="password" id="register-confirm" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="accept-terms" required>
                        <span>J'accepte les <a href="#">conditions d'utilisation</a></span>
                    </label>
                </div>

                <button type="submit" class="submit-btn">S'inscrire</button>
            </form>

            <div class="back-link">
                <a href="index.html">← Retour à l'accueil</a>
            </div>
        </div>
    </div>

    <script src="auth-script.js"></script>
</body>
</html>
