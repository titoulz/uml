<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Réservations - Restaurants Halal</title>
    <link rel="stylesheet" href="my-reservations-style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div>
                <h1>📅 Mes Réservations</h1>
                <p>Consultez et gérez vos réservations</p>
            </div>
            <div class="header-actions">
                <a href="index.html" class="btn-secondary">← Retour</a>
                <a href="profile.html" class="btn-primary">Mon profil</a>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="reservations-section">
                <div class="section-header">
                    <h2>Réservations à venir</h2>
                    <span class="count" id="upcoming-count">0</span>
                </div>
                <div id="upcoming-reservations" class="reservations-list">
                    <p class="empty-message">Aucune réservation à venir</p>
                </div>
            </div>

            <div class="reservations-section">
                <div class="section-header">
                    <h2>Réservations passées</h2>
                    <span class="count" id="past-count">0</span>
                </div>
                <div id="past-reservations" class="reservations-list">
                    <p class="empty-message">Aucune réservation passée</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Allo-Halal - Restaurants Halal à Dijon</p>
        <p style="margin-top: 0.5rem;">Développé par <strong>Tom Martin</strong>, <strong>Titouan El Mouafik</strong> et <strong>Thomas Michelin</strong></p>
    </footer>

    <script src="api-config.js"></script>
    <script src="my-reservations-script.js"></script>
</body>
</html>
